<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин Низьких Цін</title>
    <style>
        /* Umumiy stillar */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0d0d0d;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Sarlavha (Logo) Dizayni - Rasmdagi kabi */
        .header-logo {
            text-align: center;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 1px;
            margin-top: 40px;
            margin-bottom: 40px;
            transform: rotate(-3deg); /* Rasmdagi qiyalik effekti */
        }

        .logo-top {
            background-color: #ffd700;
            color: #000000;
            padding: 5px 15px;
            font-size: 1.8rem;
            display: inline-block;
            margin-bottom: 5px;
            border-radius: 3px;
            box-shadow: 3px 3px 0px rgba(255,255,255,0.1);
        }

        .logo-bottom {
            color: #ffd700;
            font-size: 3.2rem;
            display: block;
            line-height: 0.95;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* Kategoriya Tugmalari */
        .button-container {
            display: flex;
            gap: 20px;
            margin-bottom: 5px;
            width: 100%;
            max-width: 500px;
            justify-content: center;
        }

        .btn {
            flex: 1;
            background-color: #1a1a1a;
            color: #ffffff;
            border: 2px solid #ffd700;
            padding: 15px 25px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.1);
        }

        .btn:hover, .btn.active {
            background-color: #ffd700;
            color: #000000;
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4);
            transform: translateY(-2px);
        }

        /* Rasmlar joylashadigan Galereya */
        .gallery-container {
            width: 100%;
            max-width: 1000px;
            margin-top: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 10px;
        }

        /* Rasm kartochkasi */
        .image-card {
            background-color: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
            transition: transform 0.3s ease, border-color 0.3s ease;
            display: block; /* Boshida hamma rasmlar ko'rinadi */
        }

        .image-card:hover {
            transform: scale(1.03);
            border-color: #ffd700;
        }

        /* Rasm joyi (Placeholder) */
        .image-box {
            width: 100%;
            height: 320px;
            background-color: #262626;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            position: relative;
            overflow: hidden;
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Mahsulot ma'lumoti */
        .card-info {
            padding: 15px;
            text-align: center;
        }

        .card-title {
            font-size: 1.1rem;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .card-price {
            font-size: 1.3rem;
            color: #ffd700;
            font-weight: bold;
        }

        /* Mobil qurilmalar uchun moslashtirish */
        @media (max-width: 480px) {
            .logo-top { font-size: 1.3rem; }
            .logo-bottom { font-size: 2.2rem; }
            .btn { font-size: 1rem; padding: 12px 15px; }
            .image-box { height: 260px; }
        }
    </style>
</head>
<body>

    <div class="header-logo">
        <span class="logo-top">Магазин</span>
        <span class="logo-bottom">Низьких Цін</span>
    </div>

    <div class="button-container">
        <button class="btn active" onclick="filterCategory('all', this)">Усе</button>
        <button class="btn" onclick="filterCategory('odyag', this)">Одяг</button>
        <button class="btn" onclick="filterCategory('vzuttya', this)">Взуття</button>
    </div>

    <div class="gallery-container">

        <div class="image-card" data-category="odyag">
            <div class="image-box">
                <img src="5A5AB81E-1C8E-4508-B27D-C568063D217F
.png" alt="Одяг">
                <span>285C7199-C3BB-494E-9B80-B2D47BD8B5F7
.png</span>
            </div>
            <div class="card-info">
                <div class="card-title">Сучасний Одяг</div>
                <div class="card-price">810 ₴</div>
            </div>
        </div>

        <div class="image-card" data-category="vzuttya">
            <div class="image-box">
                <img src="https://via.placeholder.com/400x500/262626/ffd700?text=VZUTTYA+IMAGE+1" alt="Взуття">
                <span>Rasm joyi (Picture)</span>
            </div>
            <div class="card-info">
                <div class="card-title">Стильне Взуття</div>
                <div class="card-price">440 ₴</div>
            </div>
        </div>

        <div class="image-card" data-category="odyag">
            <div class="image-box">
                <img src="https://via.placeholder.com/400x500/262626/ffd700?text=ODYAQ+IMAGE+2" alt="Одяг">
                <span>Rasm joyi (Picture)</span>
            </div>
            <div class="card-info">
                <div class="card-title">Спортивний Одяг</div>
                <div class="card-price">СКОРО ₴</div>
            </div>
        </div>

        <div class="image-card" data-category="vzuttya">
            <div class="image-box">
                <img src="285C7199-C3BB-494E-9B80-B2D47BD8B5F7
.png" alt="Взуття">
                <span>Rasm joyi (Picture)</span>
            </div>
            <div class="card-info">
                <div class="card-title">Кросівки</div>
                <div class="card-price">СКОРО ₴</div>
            </div>
        </div>

    </div>

    <script>
        function filterCategory(category, buttonElement) {
            // Aktiv tugma stilini yangilash
            const buttons = document.querySelectorAll('.btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');

            // Kartochkalarni saralash
            const cards = document.querySelectorAll('.image-card');
            cards.forEach(card => {
                if (category === 'all') {
                    card.style.display = 'block';
                } else if (card.getAttribute('data-category') === category) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
