<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин Низьких Цін</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #1a1a1a 0%, #0d0d0d 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* LOGO SEKSIYASI */
        .header-logo {
            text-align: center;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 1px;
            margin-top: 40px;
            margin-bottom: 30px;
            transform: rotate(-3deg);
        }

        .logo-top {
            background-color: #ffd700;
            color: #000000;
            padding: 5px 15px;
            font-size: 1.8rem;
            display: inline-block;
            margin-bottom: 5px;
            border-radius: 3px;
        }

        .logo-bottom {
            color: #ffd700;
            font-size: 3.2rem;
            display: block;
            line-height: 0.95;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* KESHBEK TUGMASI */
        .cashback-btn {
            background-color: #222;
            color: #666;
            border: 2px dashed #444;
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 8px;
            margin-bottom: 40px;
            cursor: not-allowed;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .status-badge {
            background-color: #900;
            color: #fff;
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 4px;
        }

        /* KATEGORIYA TUGMALARI */
        .button-container {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            width: 100%;
            max-width: 500px;
            justify-content: center;
        }

        .btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            color: #ffffff;
            border: 2px solid #ffd700;
            padding: 15px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover, .btn.active {
            background-color: #ffd700;
            color: #000000;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        /* GALEREYA */
        .gallery-container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 10px;
        }

        .image-card {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #292929;
            transition: transform 0.3s ease;
        }

        .image-card:hover {
            transform: scale(1.02);
            border-color: #ffd700;
        }

        .image-box {
            width: 100%;
            height: 350px;
            background-color: #1e1e1e;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        .skoro-text {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffd700;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        @media (max-width: 480px) {
            .logo-top { font-size: 1.3rem; }
            .logo-bottom { font-size: 2.2rem; }
            .btn { font-size: 0.95rem; padding: 12px 10px; }
            .image-box { height: 280px; }
        }
    </style>
</head>
<body>

    <div class="header-logo">
        <span class="logo-top">Магазин</span>
        <span class="logo-bottom">Низьких Цін</span>
    </div>

    <button class="cashback-btn" disabled>
        Кешбек <span class="status-badge">НЕДОСТУПНО</span>
    </button>

    <div class="button-container">
        <button class="btn active" onclick="filterCategory('all', this)">Усе</button>
        <button class="btn" onclick="filterCategory('odyag', this)">Одяг</button>
        <button class="btn" onclick="filterCategory('vzuttya', this)">Взуття</button>
    </div>

    <div class="gallery-container">

        <div class="image-card" data-category="odyag">
            <div class="image-box">
                <span class="skoro-text">СКОРО</span>
            </div>
        </div>

            </div>
        </div>

    </div>

    <script>
        function filterCategory(category, buttonElement) {
            const buttons = document.querySelectorAll('.btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');

            const cards = document.querySelectorAll('.image-card');
            cards.forEach(card => {
                if (category === 'all') {
                    card.style.display = 'block';
                } else if (card.getAttribute('data-category') === category) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }
    </script>

</html>
